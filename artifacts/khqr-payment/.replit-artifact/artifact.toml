kind = "web"
previewPath = "/"
title = "Bakong KHQR Payment"
version = "1.0.0"
id = "artifacts/khqr-payment"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21416

[services.development]
run = "pnpm --filter @workspace/khqr-payment run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/khqr-payment", "run", "build" ]
publicDir = "artifacts/khqr-payment/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21416"
BASE_PATH = "/"
